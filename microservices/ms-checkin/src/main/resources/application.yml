# Puerto
server:
  port: ${PORT:8090}

# Nombre del Microservicio
spring:
  application:
    name: ms-checkin

  # Perfil activo (dev/prod)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Desactivar autoconfiguración de Config Server si no se usa
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

  # Configuración de Base de Datos MySQL
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:checkin_db}?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Configuración de Hibernate / JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Configuración de Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# URLs de otros microservicios conectados con el ms
config:
  ms-tickets:
    url: ${CONFIG_MS_TICKETS_URL:http://localhost:8084/api/tickets}
  ms-ordenes:
    url: ${CONFIG_MS_ORDENES_URL:http://localhost:8085/api/ordenes}

# Configuración de Swagger UI (Documentación)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method # Ordena los métodos (GET, POST, etc.)
