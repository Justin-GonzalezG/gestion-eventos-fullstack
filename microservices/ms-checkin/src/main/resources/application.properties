# Puerto y Nombre del Servicio
server.port=8090
spring.application.name=ms-checkin

# Parche config del server
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Conexión a Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/checkin_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Conexión con el servidor de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
