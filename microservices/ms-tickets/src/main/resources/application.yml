# Puerto
server:
  port: ${PORT:8084}

# Nombre del Microservicio
spring:
  application:
    name: ms-tickets
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # Desactivar autoconfiguración de Config Server
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  
  # Configuración de Base de Datos MySQL
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:tickets_db}?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Configuración de Hibernate / JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# Configuración de Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Configuración de Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method