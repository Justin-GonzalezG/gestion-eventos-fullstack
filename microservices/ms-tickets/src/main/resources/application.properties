# Puerto y Nombre del microservicio
server.port=8084
spring.application.name=ms-tickets

# Deshabilitar chequeo de servidor de configuración externo
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Conexión a Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/tickets_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Servidor de Descubrimiento Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
