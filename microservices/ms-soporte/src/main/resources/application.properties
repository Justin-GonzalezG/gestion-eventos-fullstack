# Puerto y Nombre del microservicio
server.port=8089
spring.application.name=ms-soporte

# Evitamos que se rompa al levantar si no usamos el Config Server
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Configuración de Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/soporte_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Localización del Servidor de Descubrimiento Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
