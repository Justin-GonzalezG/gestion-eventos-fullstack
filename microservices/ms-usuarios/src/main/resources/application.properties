# Puerto y Nombre del microservicio
server.port=8082
spring.application.name=ms-usuarios

# Previene caídas por falta de servidor de configuración externo
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Conexión a Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/usuarios_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Servidor de Descubrimiento Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
