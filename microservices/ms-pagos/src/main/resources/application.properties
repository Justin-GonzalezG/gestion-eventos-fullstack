# Puerto y Nombre del servicio
server.port=8086
spring.application.name=ms-pagos

# Evita la caida por el config del server, ademas que debe ser obligatorio
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Conexión a Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/pagos_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Conexion con el ms Oredenes
config.ms-ordenes.url=http://localhost:8085/api/ordenes

# Conexion con el servidor de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


# DOCUMENTACIÓN API (SWAGGER)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.info.title=API de Gestión de Pagos
springdoc.info.version=1.0.0
springdoc.info.description=Microservicio encargado de procesar transacciones del sistema.
