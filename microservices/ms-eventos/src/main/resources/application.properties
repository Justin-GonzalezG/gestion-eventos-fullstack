# Puerto y Nombre del servicio
server.port=8083
spring.application.name=ms-eventos

# Evita la caida por el config del server, ademas que debe ser obligatorio
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Conexión a Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/eventos_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Conexion con el servidor de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
