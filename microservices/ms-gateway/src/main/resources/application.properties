server.port=8091
spring.application.name=ms-gateway

# Evitamos que el Gateway se caiga al iniciar sin Config Server
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# CONEXIÓN A EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.mvc.discovery.locator.enabled=true

# [0] Ruta del ms Autenticación
spring.cloud.gateway.mvc.routes[0].id=ms-autenticacion
spring.cloud.gateway.mvc.routes[0].uri=lb://ms-autenticacion
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**

# [1] Ruta del ms Check-In
spring.cloud.gateway.mvc.routes[1].id=ms-checkin
spring.cloud.gateway.mvc.routes[1].uri=lb://ms-checkin
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/checkin/**

# [2] Ruta del ms Eventos
spring.cloud.gateway.mvc.routes[2].id=ms-eventos
spring.cloud.gateway.mvc.routes[2].uri=lb://ms-eventos
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/eventos/**

# [3] Ruta del ms Ordenes
spring.cloud.gateway.mvc.routes[3].id=ms-ordenes
spring.cloud.gateway.mvc.routes[3].uri=lb://ms-ordenes
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/ordenes/**

# [4] Ruta del ms Pagos
spring.cloud.gateway.mvc.routes[4].id=ms-pagos
spring.cloud.gateway.mvc.routes[4].uri=lb://ms-pagos
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/api/pagos/**

# [5] Ruta del ms Recomendaciones
spring.cloud.gateway.mvc.routes[5].id=ms-recomendacion
spring.cloud.gateway.mvc.routes[5].uri=lb://ms-recomendacion
spring.cloud.gateway.mvc.routes[5].predicates[0]=Path=/api/recomendaciones/**

# [6] Ruta para el ms Reportes
spring.cloud.gateway.mvc.routes[6].id=ms-reportes
spring.cloud.gateway.mvc.routes[6].uri=lb://ms-reportes
spring.cloud.gateway.mvc.routes[6].predicates[0]=Path=/api/reportes/**

# [7] Ruta del ms Soporte
spring.cloud.gateway.mvc.routes[7].id=ms-soporte
spring.cloud.gateway.mvc.routes[7].uri=lb://ms-soporte
spring.cloud.gateway.mvc.routes[7].predicates[0]=Path=/api/soporte/**

# [8] Ruta para Tickets (Apunta en plural a tu ms-tickets)
spring.cloud.gateway.mvc.routes[8].id=ms-tickets
spring.cloud.gateway.mvc.routes[8].uri=lb://ms-tickets
spring.cloud.gateway.mvc.routes[8].predicates[0]=Path=/api/tickets/**

# [9] Ruta para Categorías (Apunta al balanceador dinámico de ms-tickets)
spring.cloud.gateway.mvc.routes[9].id=ms-categorias
spring.cloud.gateway.mvc.routes[9].uri=lb://ms-tickets
spring.cloud.gateway.mvc.routes[9].predicates[0]=Path=/api/categorias/**

# [10] Ruta del ms Usuarios (Perfiles)
spring.cloud.gateway.mvc.routes[10].id=ms-usuarios
spring.cloud.gateway.mvc.routes[10].uri=lb://ms-usuarios
spring.cloud.gateway.mvc.routes[10].predicates[0]=Path=/api/usuarios/**