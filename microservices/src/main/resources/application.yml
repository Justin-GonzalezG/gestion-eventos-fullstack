server:
  port: ${PORT:8081}

spring:
  application:
    name: ms-autenticacion
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_autenticacion}?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET:EstaEsUnaClaveSecretaMuyLargaYSeguraParaElProyecto2026}
  expiration: ${JWT_EXPIRATION:86400000}

# Configuración añadida del Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
  packages-to-scan: cl.eventos.ms_autenticacion.controller
